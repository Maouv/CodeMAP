name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify frontend assets in wheel
        run: |
          unzip -l dist/codemap-*.whl | grep "codemap/frontend/"
          # Fail if frontend files are missing
          unzip -l dist/codemap-*.whl | grep -q "codemap/frontend/index.html" || \
            (echo "ERROR: frontend/index.html missing from wheel" && exit 1)
          unzip -l dist/codemap-*.whl | grep -q "codemap/frontend/graph.js" || \
            (echo "ERROR: frontend/graph.js missing from wheel" && exit 1)
          echo "Wheel contents verified OK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # GitHub Environment protection (BLUEPRINT L-01)
    permissions:
      id-token: write          # OIDC trusted publishing — no stored PyPI token

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.2  # pinned SHA via tag (BLUEPRINT L-01)
        with:
          verbose: true

