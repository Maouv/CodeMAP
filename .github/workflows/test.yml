name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, phase1-scanner-core]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check no absolute paths leak in graph JSON
        run: |
          python -c "
          from pathlib import Path
          from codemap.scanner.graph_builder import build_graph
          import json, tempfile, os

          tmp = Path(tempfile.mkdtemp())
          (tmp / 'main.py').write_text('import os\ndef foo(): pass\n')
          graph = build_graph(tmp)
          dumped = json.dumps(graph)
          assert str(tmp) not in dumped, 'Absolute path leaked into graph JSON'
          print('Path leak check: OK')
          "

